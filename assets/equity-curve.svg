<svg viewBox="0 0 960 420" class="equity-curve" role="img"
     xmlns="http://www.w3.org/2000/svg"
     aria-labelledby="ec-title ec-desc"
     preserveAspectRatio="xMidYMid meet">
  <title id="ec-title">Valhalla Capital equity curve, 19 Feb to 16 June 2026</title>
  <desc id="ec-desc">Daily portfolio value over the run. It traded quietly around
    a rising invested-capital baseline through April, peaked at $1,038.64 on
    1 May at the live-trading cutover, then ground down for six weeks to $902.32
    (-9.77 percent against invested capital), where the minus ten percent stop
    tripped and the agent was retired.</desc>
